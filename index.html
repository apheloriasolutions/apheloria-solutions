      display: flex;
      align-items: center;
      gap: 1rem;
      opacity: 0;
      animation: fadeUp 1.6s ease 0.7s forwards;
    }
    .separator span {
      display: block;
      width: 55px;
      height: 1px;
      background: #C9A96E;
      opacity: 0.4;
    }
    .separator i {
      display: block;
      width: 5px; height: 5px;
      background: #C9A96E;
      transform: rotate(45deg);
      opacity: 0.7;
    }

    .contact a {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: clamp(0.8rem, 1.6vw, 1.05rem);
      letter-spacing: 0.45em;
      color: #C9A96E;
      text-decoration: none;
      opacity: 0;
      text-transform: lowercase;
      transition: opacity 0.3s ease;
      animation: fadeUp 1.6s ease 1.1s forwards;
      display: inline-block;
    }
    .contact a:hover { opacity: 1 !important; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="content">
    <div class="message">Estamos actualizándonos</div>
    <div class="separator"><span></span><i></i><span></span></div>
    <div class="contact"><a href="mailto:info@apheloria.es">info@apheloria.es</a></div>
  </div>
</body>
</html>
